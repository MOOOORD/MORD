<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞出生天</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="menu-screen" class="screen">
  <h1 class="pixel-title">
    <span class="title-char" style="--i:0">飞</span>
    <span class="title-char" style="--i:1">出</span>
    <span class="title-char" style="--i:2">生</span>
    <span class="title-char" style="--i:3">天</span>
  </h1>
  <p class="pixel-subtitle">Break Free · 非对称生存竞技</p>
  <div id="character-showcase">
    <div class="char-card survivor">
      <canvas class="char-avatar" id="avatar-survivor" width="80" height="80"></canvas>
      <div class="char-name" style="color:#4ecdc4">陈飞飞</div>
      <div class="char-tagline">飞翔吧！</div>
    </div>
    <div class="char-vs">VS</div>
    <div class="char-card killer">
      <canvas class="char-avatar" id="avatar-killer" width="80" height="80"></canvas>
      <div class="char-name" style="color:#e94560">阴沟</div>
      <div class="char-tagline">怕你不知道跟你提一嘴，<br>人类从来没有战胜过阴沟！</div>
    </div>
  </div>
  <div id="menu-buttons"></div>
</div>
<div id="game-screen" class="screen hidden">
  <canvas id="game-canvas"></canvas>
  <div id="hud"></div>
</div>
<div id="result-screen" class="screen hidden">
  <h2 id="result-title"></h2>
  <p id="result-detail"></p>
  <button id="btn-restart">再来一局</button>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
