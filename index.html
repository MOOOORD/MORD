<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞出生天</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="menu-screen" class="screen">
  <h1 class="pixel-title">
    <span class="title-char" style="--i:0">飞</span>
    <span class="title-char" style="--i:1">出</span>
    <span class="title-char" style="--i:2">生</span>
    <span class="title-char" style="--i:3">天</span>
  </h1>
  <p class="pixel-subtitle">Break Free · 非对称生存竞技</p>
  <div id="menu-buttons"></div>
</div>
<div id="game-screen" class="screen hidden">
  <canvas id="game-canvas"></canvas>
  <div id="hud"></div>
</div>
<div id="result-screen" class="screen hidden">
  <h2 id="result-title"></h2>
  <p id="result-detail"></p>
  <button id="btn-restart">再来一局</button>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
